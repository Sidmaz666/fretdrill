<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#2c2c2c"/>
  <!-- Fretboard neck -->
  <rect x="25" y="18" width="50" height="64" rx="3" fill="#f5f0e8"/>
  <!-- Frets -->
  <line x1="35" y1="18" x2="35" y2="82" stroke="#8b7355" stroke-width="1.5"/>
  <line x1="47" y1="18" x2="47" y2="82" stroke="#8b7355" stroke-width="1.5"/>
  <line x1="59" y1="18" x2="59" y2="82" stroke="#8b7355" stroke-width="1.5"/>
  <line x1="71" y1="18" x2="71" y2="82" stroke="#8b7355" stroke-width="1.5"/>
  <!-- Strings -->
  <line x1="25" y1="26" x2="75" y2="26" stroke="#6b5b47" stroke-width="2.5" opacity="0.6"/>
  <line x1="25" y1="36" x2="75" y2="36" stroke="#6b5b47" stroke-width="2" opacity="0.6"/>
  <line x1="25" y1="46" x2="75" y2="46" stroke="#6b5b47" stroke-width="1.5" opacity="0.6"/>
  <line x1="25" y1="56" x2="75" y2="56" stroke="#6b5b47" stroke-width="1.5" opacity="0.6"/>
  <line x1="25" y1="66" x2="75" y2="66" stroke="#6b5b47" stroke-width="1" opacity="0.6"/>
  <line x1="25" y1="74" x2="75" y2="74" stroke="#6b5b47" stroke-width="1" opacity="0.6"/>
  <!-- Fret markers -->
  <circle cx="41" cy="50" r="2.5" fill="#c4b89c" opacity="0.6"/>
  <circle cx="53" cy="50" r="2.5" fill="#c4b89c" opacity="0.6"/>
  <!-- Root note -->
  <circle cx="65" cy="46" r="5" fill="#9b3939" opacity="0.85"/>
  <text x="65" y="48" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Georgia,serif">R</text>
  <!-- Headstock -->
  <rect x="30" y="6" width="40" height="14" rx="4" fill="#3a2a1a"/>
  <circle cx="40" cy="13" r="2" fill="#c4b89c"/>
  <circle cx="50" cy="13" r="2" fill="#c4b89c"/>
  <circle cx="60" cy="13" r="2" fill="#c4b89c"/>
</svg>
